<!-- I suggest I don't want to build slop, but I used AI to generate this page. What's that about? Well, I already know how to do this by hand and could easily coax AI into building it for me. 
Plus the idea and the words are ACTUALLY mine, from my actual head. The other day I wrote in a group chat, "I generally prefer to write things myself" which would have sounded insane 10 years ago. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Andrew Simone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --fg: #f0ede6;
      --accent: #c8ff00;
      --dim: #888;
      --link: #c8ff00;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body { height: 100%; }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: 'IBM Plex Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: min(900px, 60vw);
      width: 100%;
    }

    @media (max-width: 900px) {
      .container { max-width: 100%; }
    }

    .headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 6vw, 6rem);
      line-height: 0.95;
      letter-spacing: 0.01em;
      color: var(--fg);
      opacity: 0;
      transform: translateY(20px);
      animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    .headline .accent-word {
      color: var(--accent);
      display: inline;
    }

    .tagline {
      margin-top: clamp(1.25rem, 2vw, 2rem);
      font-size: clamp(0.75rem, 1vw, 0.95rem);
      font-style: italic;
      color: var(--dim);
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
      opacity: 0;
      animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.45s forwards;
    }

    .email {
      margin-top: clamp(0.6rem, 1vw, 1rem);
      font-size: clamp(0.75rem, 1vw, 0.95rem);
      opacity: 0;
      animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
    }

    .email a {
      color: var(--link);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .email a:hover {
      border-color: var(--link);
    }

    .rule {
      width: 60px;
      height: 2px;
      background: var(--accent);
      margin: clamp(1rem, 1.5vw, 2rem) auto 0;
      opacity: 0;
      animation: rise 0.5s ease 0.75s forwards;
    }

    .social {
      margin-top: clamp(0.75rem, 1.25vw, 1.25rem);
      opacity: 0;
      animation: rise 0.5s ease 0.9s forwards;
    }

    .social a {
      color: #555;
      transition: color 0.2s;
      display: inline-block;
      line-height: 0;
    }

    .social a:hover {
      color: var(--accent);
    }

    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="headline">
      Remember when the web<br>
      wasn't <span class="accent-word">dead</span> and<br>
      search engines <span class="accent-word">worked?</span><br>
      <span style="color: #666;">I do.</span>
    </h1>

    <p class="tagline">
      If you want to build something cool — that isn't slop — and need a delivery and product strategist, don't hesitate to reach out.
    </p>

    <p class="email">
      <a href="mailto:me@andrewsimone.com?subject=Let's%20Work%20Together">me@andrewsimone.com</a>
    </p>

    <div class="rule"></div>

    <div class="social">
      <a href="https://www.linkedin.com/in/andrewsimone/" target="_blank" rel="noopener" aria-label="LinkedIn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </a>
    </div>

  </div>
</body>
</html>
